name: patient-db

services:
  postgres:
    image: postgres:17-alpine
    container_name: patient-db
    restart: unless-stopped
    ports:
      - 5432:${POSTGRES_PORT}
    volumes:
      - patient-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - patient-network

volumes:
  patient-data:

networks:
  patient-network:
